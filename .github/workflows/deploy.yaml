name: Deploy – git-bot

on:
  push:
    branches: [main]
    paths:
      - "git-bot/**"
      - "helm/**"
      - "grafana/dashboards/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yaml"

permissions:
  contents: read
  packages: write  # necesario para push de imagen Docker y Helm chart a ghcr.io

# No cancelar deploys en curso; esperar que termine antes del siguiente
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Build Docker image ─────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.chart-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Autenticación contra GHCR (requiere permiso packages: write en el repo)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./git-bot
          file: ./git-bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extrae la versión del Chart para usarla en el job de Helm
      - name: Extract chart version
        id: chart-version
        run: |
          VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── 2. Publish Helm Chart a GHCR (OCI) ───────────────────────────────────────
  publish-chart:
    name: Publish Helm chart to GHCR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      # Sincroniza los dashboards de Grafana al directorio de archivos del chart
      - name: Sync dashboards into Helm chart
        run: |
          mkdir -p helm/files/dashboards
          cp grafana/dashboards/*.json helm/files/dashboards/

      # Descarga subcharts declarados en Chart.yaml
      - name: Update Helm dependencies
        run: helm dependency update helm/

      # Login OCI en GHCR
      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      # Empaqueta el chart como .tgz
      - name: Package Helm chart
        id: package
        run: |
          helm package helm/ --destination /tmp/charts
          CHART_FILE=$(ls /tmp/charts/*.tgz)
          echo "chart_file=${CHART_FILE}" >> "$GITHUB_OUTPUT"

      # Publica el chart en el OCI registry de GHCR
      # Ruta resultante: oci://ghcr.io/<owner>/charts/git-bot:<version>
      - name: Push chart to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "${{ steps.package.outputs.chart_file }}" \
            "oci://ghcr.io/${OWNER}/charts"

      - name: Log chart info
        run: |
          echo "Chart publicado:"
          echo "  oci://ghcr.io/${{ github.repository_owner }}/charts/git-bot:${{ needs.build.outputs.version }}"

  # ── 3. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, publish-chart]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SHA: ${{ github.sha }}
          CHART_VERSION: ${{ needs.build.outputs.version }}
        run: |
          echo "Deploying git-bot @ ${SHA}"
          echo "Docker image : ${IMAGE}"
          echo "Helm chart   : oci://ghcr.io/${{ github.repository_owner }}/charts/git-bot:${CHART_VERSION}"
          # Ejemplo de deploy con Helm directamente desde GHCR:
          #
          #   helm upgrade --install git-bot \
          #     oci://ghcr.io/${{ github.repository_owner }}/charts/git-bot \
          #     --version ${CHART_VERSION} \
          #     --namespace git-bot \
          #     --set image.tag=${SHA} \
          #     --set existingSecret=git-bot-secret
          #
          # Para ArgoCD, actualiza argocd/application.yaml con la nueva versión
          # y haz push; ArgoCD sincronizará automáticamente.
          echo "Deploy placeholder – implementa la lógica real aquí"
