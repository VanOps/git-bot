name: Deploy – git-bot

on:
  push:
    branches: [main]
    paths:
      - "git-bot/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yaml"

permissions:
  contents: read
  packages: write  # necesario para push a ghcr.io

# No cancelar deploys en curso; esperar que termine antes del siguiente
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Build Docker image ─────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Autenticación contra GHCR (requiere permiso packages: write en el repo)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./git-bot
          file: ./git-bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SHA: ${{ github.sha }}
        run: |
          echo "Deploying git-bot @ ${SHA}"
          echo "Image: ${IMAGE}"
          # TODO: reemplazar con el método de deploy real, por ejemplo:
          #   SSH + docker compose pull && docker compose up -d
          #   kubectl set image deployment/git-bot git-bot=${IMAGE}
          #   helm upgrade --install git-bot ./chart --set image.tag=${SHA}
          echo "Deploy placeholder – implementa la lógica real aquí"
