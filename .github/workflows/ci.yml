name: ci – git-bot

on:
  push:
    branches: [main, develop]
    paths:
      - "git-bot/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "git-bot/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["20", "22"]

    # MongoDB service so connectDB() succeeds without the 5 s timeout penalty
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: git-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: git-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: mongodb://localhost:27017/probot_test
          LOG_LEVEL: warn # keep test output clean
          # Probot requires these even for unit tests
          APP_ID: "123"
          WEBHOOK_SECRET: "test"
          PRIVATE_KEY: ""

  # ── 2. Docker image build ────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./git-bot
          file: ./git-bot/Dockerfile
          push: false
          tags: git-bot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Docker Compose validation ─────────────────────────────────────────────
  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Create a dummy .env so compose config doesn't fail on missing file
      - name: Stub .env
        run: cp git-bot/.env.example git-bot/.env

      - name: Validate compose file
        run: docker compose config --quiet
