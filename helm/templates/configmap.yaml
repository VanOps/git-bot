apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "git-bot.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-bot.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  INCIDENT_LABEL: {{ .Values.config.incidentLabel | quote }}
