{{- if .Values.grafana.enabled }}
# ConfigMaps descubiertos automáticamente por el sidecar de Grafana.
# Los archivos JSON provienen de helm/files/dashboards/ (copiados desde grafana/dashboards/).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "git-bot.fullname" . }}-dashboard-dora
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-bot.labels" . | nindent 4 }}
    # Etiqueta que el sidecar de Grafana usa para auto-descubrir dashboards
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "DORA Metrics"
data:
  dora.json: |
{{ .Files.Get "files/dashboards/dora.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "git-bot.fullname" . }}-dashboard-workflows
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-bot.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "DORA Metrics"
data:
  workflows.json: |
{{ .Files.Get "files/dashboards/workflows.json" | indent 4 }}
{{- end }}
