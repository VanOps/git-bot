apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "git-bot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "git-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "git-bot.selectorLabels" . | nindent 8 }}
      annotations:
        # Fuerza re-roll cuando cambia el ConfigMap
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: git-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          # Variables no sensibles desde ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "git-bot.fullname" . }}-config
          # Variables sensibles desde Secret
          env:
            - name: APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "git-bot.secretName" . }}
                  key: APP_ID
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "git-bot.secretName" . }}
                  key: WEBHOOK_SECRET
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "git-bot.secretName" . }}
                  key: PRIVATE_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "git-bot.secretName" . }}
                  key: DATABASE_URL
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      restartPolicy: Always
