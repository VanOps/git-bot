{{- if not .Values.existingSecret }}
# Secret mínimo de placeholder – en producción usa existingSecret apuntando
# a un secret creado con SOPS, Sealed Secrets o External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "git-bot.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-bot.labels" . | nindent 4 }}
  annotations:
    helm.sh/note: "Reemplaza los valores por los reales antes de desplegar"
type: Opaque
stringData:
  APP_ID: "CAMBIAR"
  WEBHOOK_SECRET: "CAMBIAR"
  PRIVATE_KEY: "CAMBIAR"
  DATABASE_URL: {{ printf "mongodb://%s-mongodb:27017/probot_metrics" .Release.Name | quote }}
{{- end }}
