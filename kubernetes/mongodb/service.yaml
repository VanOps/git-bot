apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: git-bot
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None   # Headless service para StatefulSet (DNS: mongodb.git-bot.svc.cluster.local)
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
      protocol: TCP
