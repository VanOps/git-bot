apiVersion: v1
kind: Service
metadata:
  name: git-bot
  namespace: git-bot
  labels:
    app.kubernetes.io/name: git-bot
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: git-bot
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
