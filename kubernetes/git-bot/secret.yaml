# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  PLANTILLA – NO aplicar directamente. Crea el secret externamente:          ║
# ║                                                                              ║
# ║  kubectl create secret generic git-bot-secret -n git-bot \                  ║
# ║    --from-literal=APP_ID=<id> \                                             ║
# ║    --from-literal=WEBHOOK_SECRET=<secret> \                                 ║
# ║    --from-literal=DATABASE_URL=mongodb://mongodb:27017/probot_metrics \     ║
# ║    --from-file=PRIVATE_KEY=./private-key.pem                                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
apiVersion: v1
kind: Secret
metadata:
  name: git-bot-secret
  namespace: git-bot
  labels:
    app.kubernetes.io/name: git-bot
    app.kubernetes.io/component: app
  annotations:
    kubernetes.io/description: "Credenciales de la GitHub App git-bot. No versionar con valores reales."
type: Opaque
stringData:
  APP_ID: "CAMBIAR"
  WEBHOOK_SECRET: "CAMBIAR"
  PRIVATE_KEY: "CAMBIAR"
  DATABASE_URL: "mongodb://mongodb:27017/probot_metrics"
