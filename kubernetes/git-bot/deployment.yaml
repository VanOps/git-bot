apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-bot
  namespace: git-bot
  labels:
    app.kubernetes.io/name: git-bot
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: git-bot
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-bot
        app.kubernetes.io/component: app
    spec:
      # Secret para pull de imagen privada en GHCR
      # kubectl create secret docker-registry ghcr-pull-secret -n git-bot \
      #   --docker-server=ghcr.io \
      #   --docker-username=<user> \
      #   --docker-password=<PAT>
      imagePullSecrets:
        - name: ghcr-pull-secret

      containers:
        - name: git-bot
          # Actualiza <owner> con el propietario real del repositorio GitHub
          image: ghcr.io/<owner>/git-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          # Variables no sensibles
          envFrom:
            - configMapRef:
                name: git-bot-config
          # Variables sensibles desde Secret
          env:
            - name: APP_ID
              valueFrom:
                secretKeyRef:
                  name: git-bot-secret
                  key: APP_ID
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: git-bot-secret
                  key: WEBHOOK_SECRET
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: git-bot-secret
                  key: PRIVATE_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: git-bot-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /metrics/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
