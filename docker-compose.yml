services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: probot_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Probot App ───────────────────────────────────────────────────────────────
  probot:
    build:
      context: ./git-bot
      dockerfile: Dockerfile
    container_name: probot_app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./git-bot/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: mongodb://mongo:27017/probot_metrics
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Mount your private key without baking it into the image
    volumes:
      - ./git-bot/private-key.pem:/usr/src/app/private-key.pem:ro

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: probot_grafana
    restart: unless-stopped
    depends_on:
      - probot          # probot expone /metrics/* que Grafana consulta
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_INSTALL_PLUGINS:         yesoreyeram-infinity-datasource
      # Permite que Grafana llame a probot (mismo Docker network)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED:   "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
    driver: local
  grafana_data:
    driver: local
