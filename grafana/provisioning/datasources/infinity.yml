apiVersion: 1

datasources:
  - name: Infinity – DORA API
    type: yesoreyeram-infinity-datasource
    uid: infinity-dora
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      # Prefijo base; las queries añaden la ruta específica
      global_queries:
        - name: DORA Summary
          id: dora-summary
          url: http://probot:3000/metrics/dora/summary
          method: GET
          type: json
